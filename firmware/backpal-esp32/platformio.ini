; PlatformIO Configuration — BackPal ESP32 Controller
; ONYX Bethlehem Labs + SSTA IP Holdings

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; Partition scheme with BLE support
board_build.partitions = default.csv

lib_deps =
    adafruit/Adafruit INA219@^1.2.1

build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DBOARD_HAS_PSRAM=0
